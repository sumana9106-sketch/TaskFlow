<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Autour+One&family=Black+Ops+One&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Margarine&display=swap" rel="stylesheet">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="autour-one-regular">
    <div class="container">
        <div class="add-sec">
            <h2>TO DO LIST</h2>
            <div class="track-sec">
                <div class="progress-sec">
                    <h1>Keep Going!</h1>
                    <h3 class="progress">0% Completed</h3>
                    <div class="bar-container">
                        <div class="bar"></div>
                    </div>
                </div>
                <div class="task-track">
                    <div class="complete">0</div>
                    <p>/</p>
                    <div class="total">0</div>
                </div>
            </div>
            <form class="input-area">
                <input type="text" id="add-work" placeholder="Add your work">
                <button type="submit" id="add-btn" ><i class="fa-solid fa-plus"></i></button>
            </form>
            <div class="list-sec">
                <ul id="task-list">
                </ul>
                <img src="images/empty.avif" class="empty-img remove" alt="empty">
            </div>
        </div>
    </div>
    <script src="app.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@4.3.1/tsparticles.confetti.bundle.min.js"></script>
          
</body>
</html>
